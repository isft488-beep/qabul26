<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISFT Qabul Blankasi (Chop etish uchun)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Inter:wght@400;600;800&display=swap');
        
        body { 
            background-color: #f3f4f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 2rem; 
            font-family: 'Inter', sans-serif;
        }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            padding: 2cm;
            margin-top: 1rem;
        }

        .title-font { font-family: 'Playfair Display', serif; }
        
        /* Ruchka bilan yozish uchun nuqtali chiziqlar */
        .fill-line { 
            border-bottom: 2px dashed #9ca3af; 
            display: inline-block; 
            min-height: 1.5rem;
        }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .a4-page { 
                width: 100%; 
                height: 100vh; 
                box-shadow: none; 
                margin: 0;
                padding: 1.5cm;
                page-break-inside: avoid;
            }
            /* Printerni o'z ranglarini saqlash uchun */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <!-- CHOP ETISH TUGMASI (Qog'ozda ko'rinmaydi) -->
    <div class="no-print w-[210mm] flex justify-end mb-4">
        <button onclick="window.print()" class="bg-[#8b003d] text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-[#5c0028] flex items-center gap-2 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            Blankani Chop Etish (Print)
        </button>
    </div>

    <!-- A4 QOG'OZ O'LCHAMIDAGI BLANKA -->
    <div class="a4-page">
        
        <!-- Blanka ramkalari -->
        <div class="absolute inset-0 m-[1cm] border-[6px] border-double border-[#5c0028]"></div>
        <div class="absolute top-[1cm] left-[1cm] w-16 h-16 border-t-[6px] border-l-[6px] border-[#8b003d]"></div>
        <div class="absolute top-[1cm] right-[1cm] w-16 h-16 border-t-[6px] border-r-[6px] border-[#8b003d]"></div>
        <div class="absolute bottom-[1cm] left-[1cm] w-16 h-16 border-b-[6px] border-l-[6px] border-[#8b003d]"></div>
        <div class="absolute bottom-[1cm] right-[1cm] w-16 h-16 border-b-[6px] border-r-[6px] border-[#8b003d]"></div>

        <div class="relative z-10 w-full h-full flex flex-col pt-4">
            
            <!-- Yuqori qism: Logo va Nom -->
            <div class="text-center text-[#5c0028] mb-10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto mb-4" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L1 7h22L12 2zm0 2.8l7.5 3.4H4.5L12 4.8zM2 9v11a2 2 0 002 2h16a2 2 0 002-2V9H2zm2 11V11h2v9H4zm4 0V11h2v9H8zm4 0V11h2v9h-2zm4 0V11h2v9h-2z"/>
                </svg>
                <h1 class="text-4xl font-black tracking-widest uppercase title-font mb-2">ISFT INSTITUTE</h1>
                <p class="text-gray-600 font-bold tracking-[0.2em] uppercase text-sm">Qabul Komissiyasi - 2026</p>
            </div>

            <!-- Sarlavha -->
            <div class="text-center mb-12">
                <h2 class="text-3xl font-black text-[#8b003d] uppercase tracking-[0.1em] border-b-4 border-[#8b003d] pb-2 inline-block title-font">
                    IMTIHON NATIJASI VARAQASI
                </h2>
            </div>

            <!-- Ma'lumotlarni to'ldirish qismi -->
            <div class="space-y-10 text-lg text-gray-800 flex-grow px-8">
                
                <div class="flex items-end">
                    <span class="font-bold whitespace-nowrap mr-3">Abituriyent F.I.SH.:</span>
                    <span class="fill-line flex-grow"></span>
                </div>

                <div class="flex items-end">
                    <span class="font-bold whitespace-nowrap mr-3">Pasport (ID Karta):</span>
                    <span class="fill-line w-48 mr-8"></span>
                    <span class="font-bold whitespace-nowrap mr-3">Telefon raqami:</span>
                    <span class="fill-line flex-grow"></span>
                </div>

                <div class="flex items-end">
                    <span class="font-bold whitespace-nowrap mr-3">Ta'lim yo'nalishi:</span>
                    <span class="fill-line flex-grow"></span>
                </div>

                <div class="flex items-center gap-10">
                    <span class="font-bold whitespace-nowrap">Ta'lim shakli:</span>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <div class="w-5 h-5 border-2 border-gray-400 rounded-sm"></div> Kunduzgi
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <div class="w-5 h-5 border-2 border-gray-400 rounded-sm"></div> Masofaviy
                    </label>
                </div>

                <!-- Natijalar bloki -->
                <div class="bg-gray-50 border-2 border-gray-300 p-8 rounded-2xl mt-12 shadow-sm">
                    <div class="flex items-end mb-8 text-xl">
                        <span class="font-black text-[#5c0028] uppercase mr-4">To'plangan ball:</span>
                        <span class="fill-line w-32 text-center text-2xl font-black"></span>
                        <span class="font-bold ml-4">/ 24 ball</span>
                    </div>

                    <div class="font-black text-[#5c0028] uppercase mb-4 text-xl">Imtihon xulosasi:</div>
                    <div class="flex flex-col gap-4 ml-4">
                        <label class="flex items-center gap-4 cursor-pointer text-lg">
                            <div class="w-6 h-6 border-2 border-green-600 rounded"></div> 
                            <b>Talabalikka tavsiya etildi</b> (9 ball va undan yuqori)
                        </label>
                        <label class="flex items-center gap-4 cursor-pointer text-lg mt-2">
                            <div class="w-6 h-6 border-2 border-red-600 rounded"></div> 
                            <b>Tavsiya etilmadi</b> (9 balldan kam)
                        </label>
                    </div>
                </div>

            </div>

            <!-- Imzo va Muhr qismi -->
            <div class="flex justify-between items-end mt-16 px-8 relative">
                
                <div class="text-left">
                    <p class="font-bold mb-2">Berilgan sana:</p>
                    <div class="flex items-end text-lg font-bold">
                        "<span class="fill-line w-12 text-center"></span>"
                        <span class="fill-line w-32 text-center mx-2"></span>
                        2026 yil.
                    </div>
                </div>
                
                <!-- Shtamp / Muhr o'rni -->
                <div class="absolute left-1/2 bottom-0 transform -translate-x-1/2">
                    <div class="w-32 h-32 border-[2px] border-dashed border-gray-400 rounded-full flex items-center justify-center text-gray-400 font-bold uppercase text-xl">
                        M.O'.
                    </div>
                </div>

                <div class="text-right">
                    <p class="font-bold mb-2 text-left">Mas'ul xodim imzosi:</p>
                    <span class="fill-line w-48 text-center"></span>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
